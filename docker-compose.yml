version: '3.8'

services:
  # MySQL база данных
  mysql:
    image: mysql:8.0
    container_name: mysql_laravel_app
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: app_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"  # Проброс на 3307, чтобы не конфликтовать с локальным MySQL
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

  # PHP-FPM для Laravel
  backend:
    build:
      context: ./backend  # предполагается, что backend код в папке backend
      dockerfile: Dockerfile
      target: production  # используем production стадию
    container_name: backend_laravel_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    working_dir: /var/www/html/backend
    volumes:
      - ./backend:/var/www/html/backend
      - ./storage/logs:/var/www/html/backend/storage/logs
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=app_db
      - DB_USERNAME=root
      - DB_PASSWORD=root
    networks:
      - app-network
    depends_on:
      mysql:
        condition: service_healthy

  # Nginx для Laravel
  nginx:
    image: nginx:alpine
    container_name: nginx_laravel_app
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      # Монтируем backend для API
      - ./backend:/var/www/html/backend
      # Монтируем собранный фронтенд
      - ./frontend/dist:/var/www/html/frontend/dist
      # Конфигурация Nginx
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
    networks:
      - app-network
    depends_on:
      - backend
      - frontend

  # Node.js для frontend (Vue 3 + Vite)
  frontend:
    build:
      context: ./frontend  # предполагается, что frontend код в папке frontend
      dockerfile: Dockerfile
      target: production
    container_name: frontend_builder_app
    restart: "no"
    working_dir: /var/www/html/frontend
    volumes:
      - ./frontend:/var/www/html/frontend
      - ./frontend/dist:/var/www/html/frontend/dist
    environment:
      - VITE_APP_WEATHER_API_KEY=215d9235c8b6f9a95c4f1260666de0c9
      - VITE_APP_TITLE=My App
      - VITE_APP_URL_API=/api
    networks:
      - app-network

  # Queue worker для Laravel (опционально)
  queue:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: queue_laravel_app
    restart: unless-stopped
    working_dir: /var/www/html/backend
    volumes:
      - ./backend:/var/www/html/backend
    command: php artisan queue:work --tries=3
    networks:
      - app-network
    depends_on:
      - backend
      - mysql

volumes:
  mysql_data:

networks:
  app-network:
    driver: bridge