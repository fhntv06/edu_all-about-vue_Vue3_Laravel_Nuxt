version: '3.8'

services:
  # MySQL база данных
  mysql:
    image: mysql:8.0
    container_name: mysql_laravel_app
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: app_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"  # Проброс на 3307, чтобы не конфликтовать с локальным MySQL
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

  # PHP-FPM для Laravel
  php:
    build:
      context: ./backend  # предполагается, что backend код в папке backend
      dockerfile: Dockerfile
      target: development  # используем development стадию
    container_name: backend_laravel_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html  # монтируем код backend
      - ./storage/logs:/var/www/html/storage/logs
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=app_db
      - DB_USERNAME=root
      - DB_PASSWORD=root
    networks:
      - app-network
    depends_on:
      mysql:
        condition: service_healthy

  # Nginx для Laravel
  nginx:
    image: nginx:alpine
    container_name: nginx_laravel_app
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/conf.d:/etc/nginx/conf.d  # конфиг nginx нужно создать отдельно
    networks:
      - app-network
    depends_on:
      - php

  # Node.js для frontend (Vue 3 + Vite)
  frontend:
    build:
      context: ./frontend  # предполагается, что frontend код в папке frontend
      dockerfile: Dockerfile
      target: development
    container_name: frontend_laravel_app
    restart: unless-stopped
    ports:
      - "5173:5173"  # Vite dev server
      - "8888:8888"  # JSON Server (если нужен)
    volumes:
      - ./frontend:/app
      - /app/node_modules  # анонимный volume для node_modules
    environment:
      - VITE_APP_WEATHER_API_KEY=215d9235c8b6f9a95c4f1260666de0c9
      - VITE_APP_TITLE=My App
      - VITE_APP_URL_API=http://nginx:80/api/posts  # используем внутреннее имя сервиса
      - CHOKIDAR_USEPOLLING=true  # для hot-reload в Docker
    networks:
      - app-network
    depends_on:
      - nginx

  # Queue worker для Laravel (опционально)
  queue:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: queue_laravel_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    command: php artisan queue:work --tries=3
    networks:
      - app-network
    depends_on:
      - php
      - mysql

volumes:
  mysql_data:

networks:
  app-network:
    driver: bridge